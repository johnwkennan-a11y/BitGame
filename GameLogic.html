<script>
    const wordBank = ["HERO", "LASER", "OZONE", "BEAST", "ALIEN", "CODE", "ROBOT"];
    let targetWord = "";
    let currentIndex = 0;
    let currentBits = [0, 0, 0, 0, 0, 0, 0, 0];
    let isTransitioning = false;

    // --- GAME TIMER & STATE ---
    let timerInterval = null;
    let timeElapsed = 0;
    const TIME_LIMIT = 90; // 90 seconds strict timer
    let gameIsOver = false;

    // --- AUDIO SYNTH ENGINE ---
    const AudioEngine = {
        ctx: null,
        init: function() {
            if (!this.ctx) {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (this.ctx.state === 'suspended') {
                this.ctx.resume();
            }
        },
        playTone: function(freq, type, duration, vol=0.1) {
            if (!this.ctx) return;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            
            gain.gain.setValueAtTime(vol, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);

            osc.connect(gain);
            gain.connect(this.ctx.destination);
            
            osc.start();
            osc.stop(this.ctx.currentTime + duration);
        },
        boopOn: function() { this.playTone(600, 'square', 0.1, 0.1); },
        boopOff: function() { this.playTone(300, 'square', 0.1, 0.1); },
        success: function() { 
            this.playTone(800, 'sine', 0.1, 0.2); 
            setTimeout(() => this.playTone(1200, 'sine', 0.3, 0.2), 100);
        },
        laser: function() {
            if (!this.ctx) return;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(800, this.ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 1.5);
            gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 1.5);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            osc.stop(this.ctx.currentTime + 1.5);
        },
        fartGameOver: function() {
            if (!this.ctx) return;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(100, this.ctx.currentTime);
            osc.frequency.linearRampToValueAtTime(30, this.ctx.currentTime + 2.0);
            gain.gain.setValueAtTime(0.5, this.ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 2.0);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            osc.stop(this.ctx.currentTime + 2.0);
        }
    };

    // DOM Elements
    const buttons = document.querySelectorAll('.bit-btn');
    const elIncomingCode = document.getElementById('incoming-code');
    const elActiveBinary = document.getElementById('active-binary');
    const elDecodeString = document.getElementById('decode-string');
    const elCodecBody = document.getElementById('codec-body');
    const heroPortal = document.getElementById('hero-portal');
    const chargeRing = document.getElementById('charge-ring');
    const elCurrentInputValue = document.getElementById('current-input-value');
    const elGasMeterFill = document.getElementById('gas-meter-fill');

    // Overlay Elements
    const splashScreen = document.getElementById('splash-screen');
    const gameScreen = document.getElementById('game-screen');
    const endScreen = document.getElementById('end-screen');
    const gameoverScreen = document.getElementById('gameover-screen');
    const btnStart = document.getElementById('btn-start');
    const btnRestart = document.getElementById('btn-restart');
    const laserBeam = document.getElementById('laser-beam');
    const enemyFinale = document.getElementById('enemy-finale');
    const victoryText = document.getElementById('victory-text');

    // Start Sequence
    btnStart.addEventListener('click', startGame);
    btnRestart.addEventListener('click', () => {
        // Apps Script iframes lock down window.location reload, so we manually soft-reset the DOM layers.
        gameoverScreen.classList.add('hidden');
        endScreen.classList.add('hidden');
        gameScreen.classList.add('hidden');
        splashScreen.classList.remove('hidden');

        resetToggles();
        elCodecBody.innerHTML = '';
        heroPortal.style.boxShadow = '';
        heroPortal.style.borderColor = 'var(--neon-magenta)';
        heroPortal.style.background = '#000';
        elIncomingCode.style.color = 'var(--neon-magenta)';
    });

    function startGame() {
        AudioEngine.init();
        targetWord = wordBank[Math.floor(Math.random() * wordBank.length)];
        currentIndex = 0;
        timeElapsed = 0;
        gameIsOver = false;
        elCodecBody.innerHTML = '';
        elGasMeterFill.style.width = '0%';
        elGasMeterFill.className = 'gas-meter-fill';

        resetToggles();
        updateTargetUI();

        splashScreen.classList.add('hidden');
        gameScreen.classList.remove('hidden');

        // Start Boss Timer
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(gameTick, 1000);
    }

    function gameTick() {
        if (gameIsOver) return;
        timeElapsed++;
        let percentage = (timeElapsed / TIME_LIMIT) * 100;
        
        if (percentage >= 100) {
            percentage = 100;
            triggerGameOver();
        }

        elGasMeterFill.style.width = percentage + '%';

        if (percentage > 85) {
            elGasMeterFill.classList.add('gas-meter-critical');
        } else if (percentage > 60) {
            elGasMeterFill.classList.add('gas-meter-warning');
        }
    }

    buttons.forEach(btn => {
        btn.addEventListener('click', () => {
            if (isTransitioning || gameIsOver) return;
            AudioEngine.init(); 

            const bitPos = parseInt(btn.getAttribute('data-bit'));

            if (btn.classList.contains('active')) {
                btn.classList.remove('active');
                btn.innerText = '0';
                currentBits[bitPos] = 0;
                AudioEngine.boopOff();
            } else {
                btn.classList.add('active');
                btn.innerText = '1';
                currentBits[bitPos] = 1;
                AudioEngine.boopOn();
            }

            updateReadouts();
        });
    });

    function updateReadouts() {
        let sum = 0;
        buttons.forEach(btn => {
            if (btn.classList.contains('active')) sum += parseInt(btn.getAttribute('data-val'));
        });

        const binString = [...currentBits].reverse().join('');
        elActiveBinary.innerText = binString;
        elCurrentInputValue.innerText = sum;

        const targetChar = targetWord.charCodeAt(currentIndex);
        if (sum === targetChar) {
            handleSuccess(sum, binString, targetWord[currentIndex]);
        }
    }

    function handleSuccess(dec, bin, char) {
        isTransitioning = true;
        AudioEngine.success();

        const hex = dec.toString(16).toUpperCase().padStart(2, '0');
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${dec}</td><td class="binary-col">${bin}</td><td>${hex}</td><td>${char}</td>`;
        elCodecBody.appendChild(tr);

        currentIndex++;
        const powerLevel = currentIndex / targetWord.length;

        heroPortal.style.boxShadow = `0 0 ${15 + (powerLevel * 40)}px rgba(255, 0, 255, ${0.3 + (powerLevel * 0.7)})`;
        chargeRing.style.setProperty('--pulse-opacity', 0.2 + (powerLevel * 0.8));
        chargeRing.style.setProperty('--pulse-scale', 2 + (powerLevel * 2));

        if (powerLevel >= 1) {
            heroPortal.style.borderColor = "var(--neon-cyan)";
            heroPortal.style.background = "rgba(0, 255, 255, 0.2)";
        }

        setTimeout(() => {
            resetToggles();
            updateTargetUI();
            isTransitioning = false;

            if (currentIndex >= targetWord.length && !gameIsOver) {
                gameIsOver = true;
                clearInterval(timerInterval);
                elIncomingCode.innerText = "SYSTEM ARMED";
                elIncomingCode.style.color = "var(--neon-lime)";
                elActiveBinary.innerText = "READY TO FIRE";
                isTransitioning = true;
                setTimeout(triggerFinale, 1500);
            }
        }, 1000);
    }

    function updateTargetUI() {
        let decodeArr = [];
        for (let i = 0; i < targetWord.length; i++) {
            if (i < currentIndex) decodeArr.push(targetWord[i]);
            else decodeArr.push("_");
        }
        elDecodeString.innerText = decodeArr.join(" ");

        if (currentIndex < targetWord.length) {
            elIncomingCode.innerText = targetWord.charCodeAt(currentIndex);
        }
    }

    function resetToggles() {
        currentBits = [0, 0, 0, 0, 0, 0, 0, 0];
        buttons.forEach(btn => {
            btn.classList.remove('active');
            btn.innerText = '0';
        });
        elActiveBinary.innerText = "00000000";
        elCurrentInputValue.innerText = "0";
    }

    function triggerGameOver() {
        if(gameIsOver) return;
        gameIsOver = true;
        clearInterval(timerInterval);
        AudioEngine.fartGameOver();
        gameScreen.classList.add('hidden');
        gameoverScreen.classList.remove('hidden');
    }

    function triggerFinale() {
        AudioEngine.laser();
        gameScreen.classList.add('hidden');
        endScreen.classList.remove('hidden');

        setTimeout(() => {
            laserBeam.classList.add('fire-laser');
            enemyFinale.classList.add('fartzilla-death');

            setTimeout(() => {
                enemyFinale.innerText = '💥';
                enemyFinale.style.animation = 'none';
                enemyFinale.style.transform = 'scale(2)';
                enemyFinale.style.opacity = '1';

                setTimeout(() => {
                    victoryText.classList.add('show');
                }, 500);
            }, 1000);
        }, 1000);
    }
</script>
