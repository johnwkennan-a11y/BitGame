<style>
    :root {
      --bg-dark: #090a0f;
      --panel-bg: #13151f;
      --neon-cyan: #0ff;
      --neon-magenta: #f0f;
      --neon-lime: #39ff14;
      --fart-green: #7fff00;
    }

    body {
      margin: 0;
      padding: 20px 0;
      background-color: var(--bg-dark);
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::after {
      content: " ";
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 2;
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
    }

    .console-container {
      background: var(--panel-bg);
      border: 2px solid var(--neon-cyan);
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.2), inset 0 0 20px rgba(0, 255, 255, 0.1);
      padding: 20px;
      width: 95%;
      max-width: 600px;
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .portals-wrapper { display: flex; justify-content: space-between; gap: 15px; }
    .portal-container { flex: 1; display: flex; flex-direction: column; align-items: center; }
    .portal-title { font-size: 1.1rem; margin-bottom: 5px; color: #fff; letter-spacing: 1px; }

    .portal {
      width: 100%; height: 100px; background: #000; border-radius: 8px;
      position: relative; overflow: hidden; display: flex;
      justify-content: center; align-items: center; font-size: 3rem;
    }

    .portal-enemy { border: 2px solid var(--fart-green); box-shadow: 0 0 15px rgba(127, 255, 0, 0.3); }
    .portal-hero { border: 2px solid var(--neon-magenta); box-shadow: 0 0 15px rgba(255, 0, 255, 0.3); transition: all 0.5s ease; }

    .fartzilla { animation: stomp 2s infinite alternate ease-in-out; }
    .gas-cloud { position: absolute; font-size: 1.5rem; opacity: 0; bottom: 10px; animation: fartRise 3s infinite linear; }
    .gas-cloud:nth-child(2) { right: 20px; animation-delay: 0.5s; }
    .gas-cloud:nth-child(3) { left: 20px; animation-delay: 1.5s; }

    .gasblastron { animation: float 3s infinite ease-in-out; z-index: 5; }
    .charge-ring {
      position: absolute; width: 40px; height: 40px; border: 2px solid var(--neon-cyan);
      border-radius: 50%; opacity: 0.2; animation: pulse 2s infinite ease-out; transition: all 0.5s ease;
    }

    .info-section { text-align: center; background: #000; padding: 15px; border-radius: 8px; border: 1px solid #333; }
    .info-line { font-size: 1.2rem; margin: 5px 0; color: #ddd; }
    .highlight { color: var(--neon-cyan); font-weight: bold; }
    .highlight-target { color: var(--neon-magenta); font-weight: bold; }

    .codec-section { text-align: center; }
    .section-title { font-size: 1.2rem; color: #fff; margin-bottom: 10px; }

    .codec-table {
      width: 100%; border-collapse: collapse; background: #000; color: var(--neon-lime);
      border: 1px solid #333; border-radius: 4px; overflow: hidden; font-family: 'VT323', monospace;
      font-size: 1.4rem; letter-spacing: 1px;
    }
    .codec-table th {
      background: rgba(0, 255, 255, 0.1); color: var(--neon-cyan); padding: 8px; text-align: left;
      font-family: 'Courier New', Courier, monospace; font-size: 1rem; border-bottom: 2px solid var(--neon-cyan);
    }
    .codec-table td { padding: 8px; border-bottom: 1px solid #222; text-align: left; }
    .codec-table .binary-col { color: #fff; }

    .toggles-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px;
      background: #000; padding: 20px; border-radius: 8px; border: 1px solid #333;
    }
    .bit-wrapper { text-align: center; }
    .bit-btn {
      width: 100%; aspect-ratio: 1; background: #222; border: 2px solid #444; border-radius: 8px;
      color: #666; font-size: 1.5rem; font-weight: bold; font-family: inherit; cursor: pointer; transition: all 0.2s;
    }
    .bit-btn.active {
      background: rgba(57, 255, 20, 0.1); border-color: var(--neon-lime); color: var(--neon-lime);
      box-shadow: 0 0 15px rgba(57, 255, 20, 0.4), inset 0 0 10px rgba(57, 255, 20, 0.2);
    }
    .bit-value { font-size: 0.7rem; color: #888; margin-top: 5px; }

    .overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(9, 10, 15, 0.98);
      z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 20px; box-sizing: border-box;
    }
    .hidden { display: none !important; }
    .story-title { font-size: 3rem; color: var(--neon-magenta); text-shadow: 0 0 15px var(--neon-magenta); margin-bottom: 20px; font-family: 'VT323', monospace; }
    .story-text { font-size: 1.2rem; max-width: 600px; line-height: 1.6; color: var(--neon-cyan); margin-bottom: 40px; }
    .action-btn {
      background: #000; border: 3px solid var(--neon-lime); color: var(--neon-lime); font-size: 2rem;
      padding: 15px 40px; font-family: 'VT323', monospace; cursor: pointer; border-radius: 8px;
      box-shadow: 0 0 20px rgba(57, 255, 20, 0.4); transition: all 0.3s;
    }
    .action-btn:hover { background: rgba(57, 255, 20, 0.2); transform: scale(1.05); }

    .finale-scene { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 800px; font-size: 6rem; position: relative; margin-bottom: 40px; }
    .laser-beam {
      position: absolute; top: 50%; left: 100px; right: 100px; height: 20px; background: var(--neon-cyan);
      box-shadow: 0 0 30px var(--neon-cyan), 0 0 60px #fff; transform: translateY(-50%) scaleX(0); transform-origin: left; z-index: 0;
    }
    .hero-finale { z-index: 1; }
    .enemy-finale { z-index: 1; transition: all 0.3s; }

    .fire-laser { animation: shootLaser 0.3s forwards ease-in; }
    .fartzilla-death { animation: deathShake 1.5s forwards; }
    .victory-text { font-size: 3rem; color: var(--neon-lime); font-family: 'VT323', monospace; opacity: 0; transition: opacity 1s; }
    .victory-text.show { opacity: 1; }

    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    @keyframes stomp { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(5px) scale(1.1); } }
    @keyframes fartRise { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 20% { opacity: 0.8; } 100% { transform: translateY(-50px) scale(1.5); opacity: 0; } }
    @keyframes pulse { 0% { transform: scale(0.5); opacity: var(--pulse-opacity, 0.2); } 100% { transform: scale(var(--pulse-scale, 2)); opacity: 0; } }
    @keyframes shootLaser { to { transform: translateY(-50%) scaleX(1); } }
    @keyframes deathShake {
      0%, 20%, 40%, 60%, 80% { transform: translateX(10px) rotate(10deg); filter: drop-shadow(0 0 20px red); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-10px) rotate(-10deg); filter: drop-shadow(0 0 20px red); }
      100% { transform: scale(0); opacity: 0; }
    }
  </style>
